<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コーサカTRPGまとめ [非公式]</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- html2canvas CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fbcfe8; 
        }
        ::-webkit-scrollbar-thumb {
            background: #f472b6; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ec4899; 
        }

        /* 📸 画像保存用スタジオ（キャプチャ時のみ使用） */
        #dynamic-capture-studio {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1140px; 
            background-color: #fff5f5; 
            padding: 30px;
            box-sizing: border-box;
        }
        #dynamic-capture-studio .studio-grid {
            display: grid;
            grid-template-columns: repeat(3, 354px);
            gap: 16px;
        }
        #dynamic-capture-studio .studio-middle-cell {
            display: table-cell !important;
            vertical-align: middle !important;
        }

        /* 🌟 対象行のハイライトアニメーション */
        @keyframes highlight-fade {
            0% { background-color: #fbcfe8; transform: scale(1.01); }
            50% { background-color: #fbcfe8; transform: scale(1.01); }
            100% { background-color: transparent; transform: scale(1); }
        }
        .highlight-jump {
            animation: highlight-fade 2.5s ease-out;
        }
    </style>
</head>
<body class="bg-pink-50/30 text-slate-800 min-h-screen flex flex-col font-sans selection:bg-pink-200 selection:text-pink-900" x-data="app()" x-init="initApp()">

    <!-- 📸 画像生成用ダミースタジオ（画面外配置） -->
    <div id="dynamic-capture-studio"></div>

    <!-- ヘッダー -->
    <header class="bg-white/80 backdrop-blur-md border-b border-pink-100 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 sm:py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3 sm:gap-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-lg sm:text-xl md:text-2xl font-black text-slate-800 tracking-tight flex items-center gap-2">
                        <span class="text-pink-500">コーサカTRPGまとめ</span>
                        <span class="text-xs font-normal text-slate-400 border border-slate-200 px-1.5 py-0.5 rounded-md">非公式</span>
                    </h1>
                    <p class="text-[10px] sm:text-xs text-slate-400 mt-0.5 flex items-center gap-1">
                        <span>最終更新:</span>
                        <span x-text="formatDateOnly(updatedAt)" class="font-medium text-slate-500"></span>
                    </p>
                </div>
            </div>

            <!-- コントロール群 -->
            <div class="flex flex-wrap items-center gap-2">
                <!-- 検索窓 -->
                <div class="relative flex-1 sm:w-64 min-w-[180px]">
                    <input type="text" 
                           x-model="searchQuery" 
                           placeholder="シナリオ、システム、参加者で検索..." 
                           class="w-full pl-9 pr-8 py-1.5 text-xs sm:text-sm bg-slate-50 border border-pink-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-300 focus:bg-white transition-all">
                    <span class="absolute left-3 top-2 text-slate-400 text-xs sm:text-sm">🔍</span>
                    <button x-show="searchQuery" 
                            @click="searchQuery = ''" 
                            class="absolute right-2.5 top-2 text-slate-400 hover:text-slate-600 text-xs font-bold">
                        ✕
                    </button>
                </div>

                <!-- フィルターボタン群 -->
                <div class="flex items-center gap-1 bg-slate-100/80 p-1 rounded-xl border border-slate-200/60 text-xs">
                    <!-- コーサカ役割 -->
                    <button @click="toggleRole('gm')" 
                            :class="kosakaRole === 'gm' ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:text-slate-900'"
                            class="px-2.5 py-1 rounded-lg transition-all">
                        GM
                    </button>
                    <button @click="toggleRole('pl')" 
                            :class="kosakaRole === 'pl' ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:text-slate-900'"
                            class="px-2.5 py-1 rounded-lg transition-all">
                        PL
                    </button>
                    
                    <div class="w-px h-3 bg-slate-300 mx-0.5"></div>

                    <!-- 視聴状況 -->
                    <button @click="toggleStatus('watched')" 
                            :class="selectedStatus === 'watched' ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:text-slate-900'"
                            class="px-2.5 py-1 rounded-lg transition-all">
                        視聴済み
                    </button>
                    <button @click="toggleStatus('unwatched')" 
                            :class="selectedStatus === 'unwatched' ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:text-slate-900'"
                            class="px-2.5 py-1 rounded-lg transition-all">
                        未視聴
                    </button>

                    <div class="w-px h-3 bg-slate-300 mx-0.5"></div>

                    <!-- お気に入り -->
                    <button @click="toggleFavoriteFilter()" 
                            :class="showFavoritesOnly ? 'bg-pink-500 text-white font-bold shadow-sm' : 'text-slate-600 hover:text-slate-900'"
                            class="px-2.5 py-1 rounded-lg transition-all flex items-center gap-1">
                        <span>★</span>
                        <span class="hidden sm:inline">お気に入り</span>
                    </button>
                </div>

                <!-- 日付フィルター & ソート -->
                <div class="flex items-center gap-1 text-xs">
                    <input type="date" x-model="startDate" class="bg-slate-50 border border-pink-100 rounded-lg px-2 py-1 text-slate-600 text-xs focus:outline-none focus:ring-1 focus:ring-pink-300">
                    <span class="text-slate-400">~</span>
                    <input type="date" x-model="endDate" class="bg-slate-50 border border-pink-100 rounded-lg px-2 py-1 text-slate-600 text-xs focus:outline-none focus:ring-1 focus:ring-pink-300">
                    
                    <button @click="toggleSortOrder()" 
                            class="bg-white border border-pink-200 text-pink-600 px-2.5 py-1 rounded-lg hover:bg-pink-50 font-bold transition-all flex items-center gap-1">
                        <span x-text="sortOrder === 'desc' ? '降順 🔻' : '昇順 🔺'"></span>
                    </button>
                </div>

                <!-- 画像保存ボタン -->
                <button @click="downloadAsImage()" 
                        class="bg-pink-500 hover:bg-pink-600 text-white text-xs font-bold px-3 py-1.5 rounded-xl shadow-sm hover:shadow transition-all flex items-center gap-1 ml-auto md:ml-0">
                    <span>📷</span>
                    <span>画像で保存</span>
                </button>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-1 w-full">

        <!-- モバイル表示（カード形式） -->
        <div id="mobile-card-container" class="grid grid-cols-1 gap-4 md:hidden">
            <template x-for="stream in filteredStreams()" :key="stream.id">
                <div :id="stream.id" class="bg-white rounded-2xl border border-pink-100 p-4 shadow-sm space-y-3 relative transition-all">
                    <!-- カードヘッダー -->
                    <div class="flex items-center justify-between border-b border-pink-50 pb-2">
                        <div class="flex items-center gap-2">
                            <!-- 視聴済みボタン -->
                            <button @click="toggleWatched(stream.id)" 
                                    :class="isWatched(stream.id) ? 'bg-pink-500 text-white border-pink-500' : 'bg-slate-100 text-slate-400 border-slate-200'"
                                    class="w-5 h-5 rounded-md border flex items-center justify-center text-xs font-bold transition-all">
                                ✓
                            </button>
                            <!-- 日付 -->
                            <span class="text-xs text-slate-400 font-medium" x-text="stream.date"></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <!-- システム名 -->
                            <span class="bg-slate-100 text-slate-600 text-[10px] px-2 py-0.5 rounded-full font-bold" x-text="stream.system"></span>
                            <!-- お気に入りボタン -->
                            <button @click="toggleFavorite(stream.id)" 
                                    :class="isFavorite(stream.id) ? 'text-amber-400' : 'text-slate-300 hover:text-amber-300'"
                                    class="text-lg leading-none transition-all">
                                ★
                            </button>
                        </div>
                    </div>

                    <!-- サムネイル＆シナリオ名 -->
                    <div class="flex gap-3 items-start cursor-pointer" @click="openModal(stream)">
                        <template x-if="getYoutubeId(stream.links)">
                            <div class="w-24 shrink-0 aspect-video bg-pink-50 rounded-lg overflow-hidden border border-pink-100/60 shadow-sm relative group">
                                <img :src="'https://img.youtube.com/vi/' + getYoutubeId(stream.links) + '/mqdefault.jpg'" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black/10 group-hover:bg-transparent transition-all"></div>
                            </div>
                        </template>
                        <template x-if="!getYoutubeId(stream.links)">
                            <div class="w-24 shrink-0 aspect-video bg-pink-50/50 rounded-lg flex items-center justify-center border border-pink-100/40">
                                <span class="text-[10px] text-pink-300 font-bold">NO IMAGE</span>
                            </div>
                        </template>
                        <div class="flex-1 min-w-0">
                            <h2 class="font-bold text-slate-800 text-sm leading-snug hover:text-pink-600 transition-colors break-words" x-text="stream.scenario"></h2>
                            <template x-if="stream.adminNote">
                                <p class="text-[11px] text-slate-400 mt-1 line-clamp-2" x-text="stream.adminNote"></p>
                            </template>
                        </div>
                    </div>

                    <!-- 参加者情報 -->
                    <div class="space-y-1.5 pt-1 text-xs">
                        <!-- GM -->
                        <div class="flex items-center gap-1.5 text-slate-600">
                            <span class="font-bold text-slate-400 text-[10px] w-6 shrink-0">GM</span>
                            <span class="font-bold text-slate-700 truncate" x-text="stream.gm"></span>
                        </div>
                        <!-- PL (PC) -->
                        <div class="flex items-start gap-1.5 text-slate-600">
                            <span class="font-bold text-slate-400 text-[10px] w-6 shrink-0 mt-0.5">PL</span>
                            <div class="flex flex-wrap gap-1 flex-1">
                                <template x-for="char in stream.characters" :key="char.pcName">
                                    <span class="bg-pink-50/60 text-pink-700 text-[10px] font-medium px-1.5 py-0.5 rounded-md border border-pink-100/50">
                                        <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                    </span>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- 外部リンクボタン -->
                    <template x-if="stream.links && stream.links.length > 0">
                        <div class="flex flex-wrap gap-1.5 pt-2 border-t border-pink-50">
                            <template x-for="link in stream.links" :key="link.url">
                                <a :href="link.url" target="_blank" 
                                   class="text-[10px] bg-slate-50 hover:bg-pink-50 text-slate-600 hover:text-pink-600 border border-slate-200 hover:border-pink-200 px-2 py-1 rounded-md font-bold transition-all inline-flex items-center gap-1">
                                    <span x-text="link.title || '配信リンク'"></span>
                                    <span>↗</span>
                                </a>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <!-- PC表示（テーブル形式） -->
        <div class="hidden md:block bg-white rounded-2xl border border-pink-100 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-pink-50/50 border-b border-pink-100 text-xs text-slate-500 font-bold">
                        <th class="py-3 px-3 w-10 text-center">視</th>
                        <th class="py-3 px-3 w-10 text-center">★</th>
                        <th class="py-3 px-3 w-24">日付</th>
                        <th class="py-3 px-3 w-28">システム</th>
                        <th class="py-3 px-4">シナリオ</th>
                        <th class="py-3 px-3 w-32">GM</th>
                        <th class="py-3 px-4">PL (PC)</th>
                        <th class="py-3 px-3 w-28">リンク</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-pink-50 text-xs">
                    <template x-for="stream in filteredStreams()" :key="stream.id">
                        <tr :id="stream.id" class="hover:bg-pink-50/20 transition-colors group">
                            <!-- 視聴状態 -->
                            <td class="py-3 px-3 text-center">
                                <button @click="toggleWatched(stream.id)" 
                                        :class="isWatched(stream.id) ? 'bg-pink-500 text-white border-pink-500' : 'bg-slate-50 text-slate-300 border-slate-200 hover:border-slate-300'"
                                        class="w-5 h-5 rounded border inline-flex items-center justify-center font-bold transition-all">
                                    ✓
                                </button>
                            </td>
                            <!-- お気に入り -->
                            <td class="py-3 px-3 text-center">
                                <button @click="toggleFavorite(stream.id)" 
                                        :class="isFavorite(stream.id) ? 'text-amber-400' : 'text-slate-200 group-hover:text-slate-300 hover:text-amber-300'"
                                        class="text-base leading-none transition-all">
                                    ★
                                </button>
                            </td>
                            <!-- 日付 -->
                            <td class="py-3 px-3 text-slate-400 font-medium whitespace-nowrap" x-text="stream.date"></td>
                            <!-- システム -->
                            <td class="py-3 px-3">
                                <span class="bg-slate-100 text-slate-600 text-[10px] px-2 py-0.5 rounded-full font-bold whitespace-nowrap" x-text="stream.system"></span>
                            </td>
                            <!-- シナリオ名 -->
                            <td class="py-3 px-4">
                                <div class="font-bold text-slate-800 hover:text-pink-600 cursor-pointer transition-colors" @click="openModal(stream)" x-text="stream.scenario"></div>
                            </td>
                            <!-- GM -->
                            <td class="py-3 px-3 font-bold text-slate-700 whitespace-nowrap" x-text="stream.gm"></td>
                            <!-- PL (PC) -->
                            <td class="py-3 px-4">
                                <div class="flex flex-wrap gap-1">
                                    <template x-for="char in stream.characters" :key="char.pcName">
                                        <span class="bg-pink-50/60 text-pink-700 text-[10px] font-medium px-1.5 py-0.5 rounded-md border border-pink-100/50 whitespace-nowrap">
                                            <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                        </span>
                                    </template>
                                </div>
                            </td>
                            <!-- リンク -->
                            <td class="py-3 px-3">
                                <div class="flex flex-col gap-1">
                                    <template x-for="link in stream.links" :key="link.url">
                                        <a :href="link.url" target="_blank" class="text-[10px] text-pink-500 hover:underline font-bold truncate max-w-[100px] inline-flex items-center gap-0.5">
                                            <span x-text="link.title || '配信'"></span>
                                            <span>↗</span>
                                        </a>
                                    </template>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

    </main>

    <!-- 配信詳細モーダル -->
    <div x-show="modalOpen" 
         x-cloak 
         class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        
        <div @click.away="closeModal()" 
             class="bg-white rounded-3xl max-w-2xl w-full max-h-[85vh] overflow-y-auto p-6 shadow-xl border border-pink-100 space-y-5 relative">
            
            <!-- 閉じるボタン -->
            <button @click="closeModal()" class="absolute top-5 right-5 text-slate-400 hover:text-slate-600 text-lg font-bold w-8 h-8 rounded-full bg-slate-50 hover:bg-slate-100 flex items-center justify-center transition-all">
                ✕
            </button>

            <!-- モーダルヘッダー -->
            <div>
                <div class="flex items-center gap-2 text-xs text-slate-400 font-medium mb-1">
                    <span x-text="activeStream.date"></span>
                    <span>•</span>
                    <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-bold" x-text="activeStream.system"></span>
                </div>
                <h2 class="text-xl font-black text-slate-800 leading-snug pr-8" x-text="activeStream.scenario"></h2>
            </div>

            <!-- 管理者メモ -->
            <template x-if="activeStream.adminNote">
                <div class="bg-pink-50/50 border border-pink-100 rounded-2xl p-4 text-xs sm:text-sm text-slate-700 leading-relaxed" 
                     x-html="renderAdminNote(activeStream.adminNote)">
                </div>
            </template>

            <!-- 参加キャラクター詳細 -->
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-slate-400 tracking-wider uppercase">参加キャラクター</h3>
                <div class="grid grid-cols-1 gap-3">
                    <template x-for="char in activeStream.characters" :key="char.pcName">
                        <div class="bg-slate-50/80 rounded-2xl p-4 border border-slate-100 space-y-2">
                            <div class="flex items-center justify-between">
                                <div class="font-bold text-slate-800 text-sm">
                                    <span x-text="char.pcName" class="text-pink-600"></span>
                                    <template x-if="char.plName">
                                        <span class="text-xs text-slate-500 font-normal ml-1" x-text="'（PL: ' + char.plName + '）'"></span>
                                    </template>
                                </div>
                            </div>

                            <!-- キャラクター履歴 -->
                            <template x-if="char.history">
                                <div class="text-xs text-slate-500 space-y-1 bg-white p-2.5 rounded-xl border border-slate-100">
                                    <span class="font-bold text-slate-400 text-[10px] block mb-1">通過履歴</span>
                                    <template x-for="item in parseHistoryLinks(char.history)" :key="item.title">
                                        <div class="flex items-center gap-1">
                                            <span class="text-slate-400">•</span>
                                            <template x-if="item.url">
                                                <a :href="item.url" target="_blank" class="text-pink-500 font-bold hover:underline inline-flex items-center gap-0.5">
                                                    <span x-text="item.title"></span>
                                                    <span class="text-[10px]">↗</span>
                                                </a>
                                            </template>
                                            <template x-if="!item.url">
                                                <span x-text="item.title" class="text-slate-600"></span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template x-if="char.note">
                                <div class="text-slate-700 leading-relaxed whitespace-pre-wrap text-xs sm:text-sm pt-1" 
                                     x-html="renderCharNote(char.note)">
                                </div>
                            </template>

                            <template x-if="char.charasheetUrl">
                                <div class="pt-1">
                                    <a :href="char.charasheetUrl" target="_blank" class="inline-flex items-center gap-1 text-pink-500 font-bold hover:underline">
                                        <span>キャラクターシートを見る</span>
                                        <span class="text-[10px]">↗</span>
                                    </a>
                                </div>
                            </template>

                        </div>
                    </template>
                </div>
            </div>

        </div>
    </div>

    <script>
        function app() {
            return {
                updatedAt: "同期中...",
                streams: [],
                searchQuery: "",
                kosakaRole: "all",
                selectedStatus: "all",
                startDate: "",
                endDate: "",
                sortOrder: "desc",
                watchedIds: [],
                favoriteIds: [],
                showFavoritesOnly: false,
                modalOpen: false,
                activeStream: {},

                async initApp() {
                    const savedWatched = localStorage.getItem('trpg_watched_ids');
                    if (savedWatched) this.watchedIds = JSON.parse(savedWatched);

                    const savedFavs = localStorage.getItem('trpg_fav_ids');
                    if (savedFavs) this.favoriteIds = JSON.parse(savedFavs);
                    
                    try {
                        const response = await fetch('https://na-nasika.github.io/ktrpg-fan-db/data.json');
                        if (!response.ok) throw new Error('データが見つかりません');
                        const data = await response.json();
                        
                        this.streams = data.streams;
                        this.updatedAt = data.updatedAt;
                    } catch (error) {
                        console.error("データの読み込みに失敗しました:", error);
                        this.updatedAt = "読み込みエラー";
                    }
                },

                formatDateOnly(dateTimeStr) {
                    if (!dateTimeStr || dateTimeStr === "同期中..." || dateTimeStr === "読み込みエラー") return dateTimeStr;
                    return dateTimeStr.split(" ")[0];
                },

                parseHistoryLinks(text) {
                    if (!text) return [];
                    const items = [];
                    const lines = text.split('\n');

                    for (let i = 0; i < lines.length; i++) {
                        const cleanLine = lines[i].trim();
                        if (!cleanLine) continue; 

                        let title = cleanLine;
                        let url = null;

                        const httpIndex = cleanLine.indexOf('http');
                        if (httpIndex !== -1) {
                            title = cleanLine.substring(0, httpIndex).trim();
                            url = cleanLine.substring(httpIndex).trim();
                        } else {
                            title = cleanLine;
                            url = null;
                        }

                        title = title.replace(/[:：\s]+$/, '').trim();
                        if (!title) title = 'シナリオ';

                        items.push({ title: title, url: url });
                    }
                    return items;
                },

renderAdminNote(text) {
    if (!text) return '';
    
    let safeText = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

    safeText = safeText.replace(/\[(.*?)\]\((https?:\/\/[^\s\)]+)\)/g, (match, label, url) => {
        return `<a href="${url}" target="_blank" class="text-pink-500 font-bold hover:underline inline-flex items-center gap-0.5">${label}<span class="text-[10px] font-normal text-pink-400">↗</span></a>`;
    });

    safeText = safeText.replace(/@(\d+)/g, (match, id) => {
        const targetId = 'stream_' + id;
        const found = this.streams.find(s => s.id === targetId);
        const titleText = found ? found.scenario : `@${id}`;
        return `<span data-jump-id="${targetId}" class="text-pink-500 font-bold underline cursor-pointer hover:text-pink-700 select-none">${titleText}<span class="text-[10px] font-normal text-pink-400 ml-0.5">↗</span></span>`;
    });

    return safeText;
},

renderCharNote(text) {
    if (!text) return '';

    let safeText = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

    safeText = safeText.replace(/(#[^\s#\n\r]+)/g, (match) => {
        const tagName = match.substring(1).trim();
        return `<span onclick="window.dispatchEvent(new CustomEvent('execute-tag-search', {detail: '${tagName}'}))" class="text-slate-600 underline decoration-slate-400/60 hover:text-pink-600 hover:decoration-pink-500 font-semibold cursor-pointer select-none transition-colors">${match}</span>`;
    });

    return safeText;
},

renderCharNote(text) {
    if (!text) return '';

    let safeText = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

    safeText = safeText.replace(/(#[^\s#\n\r]+)/g, (match) => {
        const tagName = match.substring(1).trim();
        return `<span onclick="window.dispatchEvent(new CustomEvent('execute-tag-search', {detail: '${tagName}'}))" class="text-slate-600 underline decoration-slate-400/60 hover:text-pink-600 hover:decoration-pink-500 font-semibold cursor-pointer select-none transition-colors">${match}</span>`;
    });

    return safeText;
},

searchByTag(tagName) {
    this.searchQuery = tagName;
    this.closeModal();
    window.scrollTo({ top: 0, behavior: 'smooth' });
},

                getYoutubeId(links) {
                    if (!links || links.length === 0) return null;
                    const ytLink = links.find(l => l.url && (l.url.includes('youtube.com') || l.url.includes('youtu.be')));
                    if (!ytLink || !ytLink.url) return null;
                    const url = ytLink.url.trim();
                    if (url.includes('watch?v=')) {
                        const parts = url.split('v=');
                        if (parts[1]) return parts[1].split('&')[0];
                    }
                    const pathTypes = ['/live/', '/shorts/', '/embed/'];
                    for (const type of pathTypes) {
                        if (url.includes(type)) {
                            const parts = url.split(type);
                            if (parts[1]) return parts[1].split('?')[0].split('&')[0];
                        }
                    }
                    if (url.includes('youtu.be/')) {
                        const parts = url.split('youtu.be/');
                        if (parts[1]) return parts[1].split('?')[0].split('&')[0];
                    }
                    return null;
                },

                toggleRole(role) {
                    this.kosakaRole = this.kosakaRole === role ? "all" : role;
                },

                toggleStatus(status) {
                    this.selectedStatus = this.selectedStatus === status ? "all" : status;
                },

                toggleSortOrder() {
                    this.sortOrder = this.sortOrder === 'desc' ? 'asc' : 'desc';
                },

                toggleFavoriteFilter() {
                    this.showFavoritesOnly = !this.showFavoritesOnly;
                },

                filteredStreams() {
                    let result = this.streams.filter(stream => {
                        const query = this.searchQuery.toLowerCase();
                        const matchQuery = !query || 
                            stream.scenario.toLowerCase().includes(query) ||
                            stream.system.toLowerCase().includes(query) ||
                            stream.gm.toLowerCase().includes(query) ||
                            (stream.adminNote && stream.adminNote.toLowerCase().includes(query)) ||
                            (stream.hashtag && stream.hashtag.toLowerCase().includes(query)) ||
                            stream.characters.some(c => 
                                (c.pcName && c.pcName.toLowerCase().includes(query)) || 
                                (c.plName && c.plName.toLowerCase().includes(query)) ||
                                (c.note && c.note.toLowerCase().includes(query))
                            );

                        let matchKosaka = true;
                        if (this.kosakaRole === 'gm') {
                            matchKosaka = stream.gm.includes('コーサカ');
                        } else if (this.kosakaRole === 'pl') {
                            matchKosaka = stream.characters.some(c => c.plName && c.plName.includes('コーサカ'));
                        }

                        let matchDate = true;
                        const streamDateStr = stream.date.replace(/\//g, '-');
                        if (this.startDate && streamDateStr < this.startDate) matchDate = false;
                        if (this.endDate && streamDateStr > this.endDate) matchDate = false;
                        
                        let matchStatus = true;
                        const watched = this.isWatched(stream.id);
                        if (this.selectedStatus === 'watched') matchStatus = watched;
                        if (this.selectedStatus === 'unwatched') matchStatus = !watched;

                        let matchFav = true;
                        if (this.showFavoritesOnly) matchFav = this.isFavorite(stream.id);

                        return matchQuery && matchKosaka && matchDate && matchStatus && matchFav;
                    });

                    return result.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        return this.sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
                    });
                },

                isWatched(id) {
                    return this.watchedIds.includes(id);
                },

                toggleWatched(id) {
                    if (this.isWatched(id)) {
                        this.watchedIds = this.watchedIds.filter(wId => wId !== id);
                    } else {
                        this.watchedIds.push(id);
                    }
                    localStorage.setItem('trpg_watched_ids', JSON.stringify(this.watchedIds));
                },

                isFavorite(id) {
                    return this.favoriteIds.includes(id);
                },

                toggleFavorite(id) {
                    if (this.isFavorite(id)) {
                        this.favoriteIds = this.favoriteIds.filter(fId => fId !== id);
                    } else {
                        this.favoriteIds.push(id);
                    }
                    localStorage.setItem('trpg_fav_ids', JSON.stringify(this.favoriteIds));
                },

                async downloadAsImage() {
                    const studio = document.getElementById('dynamic-capture-studio');
                    if (!studio) return;
                    
                    studio.innerHTML = '';
                    
                    const gridWrapper = document.createElement('div');
                    gridWrapper.className = 'studio-grid';
                    
                    const currentFavStreams = this.filteredStreams();
                    if (currentFavStreams.length === 0) {
                        alert("保存するデータがありません。");
                        return;
                    }

                    currentFavStreams.forEach(stream => {
                        const card = document.createElement('div');
                        card.className = "bg-white rounded-2xl border border-pink-100 p-4 shadow-sm space-y-3 relative";
                        card.style.width = '354px';
                        card.style.maxWidth = '354px';
                        card.style.display = 'block';

                        const header = document.createElement('div');
                        header.className = "flex items-center justify-between border-b border-pink-50 pb-2";
                        
                        const leftGroup = document.createElement('div');
                        leftGroup.className = "flex items-center gap-2";
                        leftGroup.innerHTML = `<div class="w-2.5 h-2.5 rounded-full bg-pink-400 border border-pink-400"></div><span class="text-xs text-slate-400 font-medium">${stream.date}</span>`;
                        
                        header.appendChild(leftGroup);
                        card.appendChild(header);

                        const centerSection = document.createElement('div');
                        centerSection.className = "flex gap-3 items-center";
                        
                        const ytId = this.getYoutubeId(stream.links);
                        const thumbHtml = ytId 
                            ? `<div class="w-28 shrink-0 aspect-video h-[64px] bg-pink-50 rounded-lg overflow-hidden border border-pink-100/60 shadow-sm"><img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" class="w-full h-full object-cover"></div>`
                            : `<div class="w-28 shrink-0 aspect-video h-[64px] bg-pink-50/50 rounded-lg flex items-center justify-center border border-pink-100/40"><span class="text-[10px] text-pink-300 font-bold">NO IMAGE</span></div>`;
                        
                        centerSection.innerHTML = thumbHtml;

                        const textCell = document.createElement('div');
                        textCell.className = "studio-middle-cell flex-1 min-w-0";
                        textCell.style.display = 'table-cell';
                        textCell.style.verticalAlign = 'middle';
                        textCell.innerHTML = `
                            <div class="font-bold text-slate-900 tracking-wide text-xs leading-snug break-words">${stream.scenario}</div>
                            <div class="mt-0.5 leading-none"><span class="inline-block bg-slate-100 text-slate-500 text-[9px] px-1.5 py-0.5 rounded-md font-medium">${stream.system}</span></div>
                        `;
                        centerSection.appendChild(textCell);
                        card.appendChild(centerSection);

                        const gmSection = document.createElement('div');
                        gmSection.className = "flex items-center justify-between gap-2 pt-1";
                        gmSection.innerHTML = `
                            <div class="text-[11px] text-slate-500 truncate flex items-center pt-0.5 pb-1 leading-loose" style="line-height: 2 !important;">
                                <span class="font-bold text-slate-400 mr-1">GM:</span>
                                <span class="font-bold text-slate-700">${stream.gm}</span>
                            </div>
                        `;
                        card.appendChild(gmSection);

                        const plSection = document.createElement('div');
                        plSection.className = "bg-pink-50/20 rounded-xl p-2.5 text-[11px] border border-pink-50/50 flex flex-wrap gap-1 mt-1 items-center";
                        
                        let plBadges = `<span class="text-slate-400 font-bold mr-1 shrink-0">PL:</span><div class="flex flex-wrap gap-1 flex-1 items-center">`;
                        stream.characters.forEach(char => {
                            const nameText = char.plName ? `${char.plName}（${char.pcName}）` : char.pcName;
                            plBadges += `<span class="bg-white text-pink-700 text-[10px] font-medium px-1.5 py-1 rounded-md border border-pink-100 flex items-center justify-center leading-none text-center">${nameText}</span>`;
                        });
                        plBadges += `</div>`;
                        plSection.innerHTML = plBadges;
                        card.appendChild(plSection);

                        gridWrapper.appendChild(card);
                    });
                    
                    studio.appendChild(gridWrapper);
                    
                    try {
                        const canvas = await html2canvas(studio, {
                            useCORS: true, 
                            backgroundColor: '#fff5f5', 
                            scale: 2, 
                            logging: false,
                            onclone: (clonedDoc) => {
                                const targetStudio = clonedDoc.getElementById('dynamic-capture-studio');
                                if (targetStudio) {
                                    targetStudio.style.position = 'static';
                                    targetStudio.style.top = '0';
                                    targetStudio.style.left = '0';
                                }
                            }
                        });
                        
                        const link = document.createElement('a');
                        link.download = `kosaka_trpg_favorites_${new Date().toISOString().slice(0,10)}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (error) {
                        console.error("画像の生成に失敗しました:", error);
                        alert("画像の保存中にエラーが発生しました。");
                    } finally {
                        studio.innerHTML = ''; 
                    }
                },

                openModal(streamData) {
                    this.activeStream = streamData;
                    this.modalOpen = true;
                },

                closeModal() {
                    this.modalOpen = false;
                    this.activeStream = {};
                }
            }
        }

        // 🛠️ Alpineのスコープ外から安全に検索を実行するためのイベントリスナー
        window.addEventListener('search-tag', (e) => {
            const appEl = document.querySelector('[x-data]');
            if (appEl && appEl.__x) {
                appEl.__x.$data.searchByTag(e.detail);
            }
        });
        // ⚠️【開通処理】HTML内の文字列クリックからAlpine内の変数へ安全にブリッジするイベント
window.addEventListener('execute-tag-search', (e) => {
    const appEl = document.querySelector('[x-data]');
    if (appEl && appEl.__x) {
        appEl.__x.$data.searchByTag(e.detail);
    }
});
    </script>
