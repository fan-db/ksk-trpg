<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コーサカTRPGまとめ [非公式]</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* スクロールバーを落ち着いたマゼンタ（ローズ）に */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #fff5f5; }
        ::-webkit-scrollbar-thumb { background: #e11d48; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #be123c; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-rose-100 selection:text-rose-900">

    <div x-data="app()" x-init="initApp()" class="max-w-6xl mx-auto px-4 py-8">
        
        <header class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 pb-4 border-b border-slate-200">
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">コーサカTRPGまとめ</h1>
                <span class="text-[11px] bg-rose-50 text-rose-700 px-2 py-0.5 rounded-md font-bold border border-rose-100">非公式</span>
            </div>
            <div class="text-xs text-slate-500 font-medium">
                最終更新: <span x-text="updatedAt" class="text-slate-800 font-semibold"></span>
            </div>
        </header>

        <div class="bg-white p-4 rounded-xl border border-slate-200 mb-6 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">🔍 キーワード検索</label>
                    <input type="text" x-model="searchQuery" placeholder="シナリオ、システム、PL、PC名..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-500 focus:border-rose-500 transition-all">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">📅 期間で絞り込み</label>
                    <div class="flex items-center gap-2">
                        <input type="date" x-model="startDate" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-500 focus:border-rose-500 transition-all">
                        <span class="text-slate-400 text-xs">〜</span>
                        <input type="date" x-model="endDate" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-rose-500 focus:border-rose-500 transition-all">
                    </div>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-x-6 gap-y-3 pt-3 border-t border-slate-100 text-xs">
                <div class="flex items-center gap-2">
                    <span class="font-bold text-slate-400">配役:</span>
                    <div class="inline-flex rounded-lg p-0.5 bg-slate-100">
                        <button @click="kosakaRole = 'all'" :class="kosakaRole === 'all' ? 'bg-white text-rose-700 font-bold shadow-xs' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">すべて</button>
                        <button @click="kosakaRole = 'gm'" :class="kosakaRole === 'gm' ? 'bg-rose-600 text-white font-bold shadow-xs' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">GM</button>
                        <button @click="kosakaRole = 'pl'" :class="kosakaRole === 'pl' ? 'bg-rose-600 text-white font-bold shadow-xs' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">PL</button>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <span class="font-bold text-slate-400">ステータス:</span>
                    <div class="inline-flex rounded-lg p-0.5 bg-slate-100">
                        <button @click="selectedStatus = 'all'" :class="selectedStatus === 'all' ? 'bg-white text-rose-700 font-bold shadow-xs' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">すべて</button>
                        <button @click="selectedStatus = 'watched'" :class="selectedStatus === 'watched' ? 'bg-rose-600 text-white font-bold shadow-xs' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">✅ 視聴済み</button>
                        <button @click="selectedStatus = 'unwatched'" :class="selectedStatus === 'unwatched' ? 'bg-white text-slate-700 font-bold shadow-xs border border-slate-200' : 'text-slate-600'" class="px-3 py-1 rounded-md transition-all">⬜ 未視聴</button>
                    </div>
                </div>

                <div class="flex items-center gap-2 sm:ml-auto">
                    <span class="font-bold text-slate-400">日付順:</span>
                    <button @click="toggleSortOrder()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-3 py-1 rounded-lg transition-all flex items-center gap-1">
                        <span x-text="sortOrder === 'desc' ? '新しい順' : '古い順'"></span>
                        <span class="text-[10px]">▼▲</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-xs">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-600 uppercase tracking-wider">
                            <th class="py-3 px-4 w-16 text-center">視聴</th>
                            <th class="py-3 px-4 w-28">配信日</th>
                            <th class="py-3 px-4">シナリオ / システム</th>
                            <th class="py-3 px-4">GM</th>
                            <th class="py-3 px-4">PL (PC ※詳細)</th>
                            <th class="py-3 px-4 w-32 text-center">リンク</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm">
                        <template x-for="stream in filteredStreams()" :key="stream.id">
                            <tr class="hover:bg-slate-50/80 transition-colors" :class="isWatched(stream.id) ? 'bg-rose-50/10' : ''">
                                <td class="py-3 px-4 text-center">
                                    <input type="checkbox" :checked="isWatched(stream.id)" @change="toggleWatched(stream.id)" class="w-4 h-4 rounded border-slate-300 text-rose-600 focus:ring-rose-500 cursor-pointer accent-rose-600">
                                </td>
                                <td class="py-3 px-4 text-slate-500 font-medium" x-text="stream.date"></td>
                                <td class="py-3 px-4">
                                    <div class="font-bold text-slate-900" x-text="stream.scenario"></div>
                                    <span class="inline-block bg-slate-100 text-slate-600 text-[11px] px-1.5 py-0.2 rounded-sm mt-1 font-medium" x-text="stream.system"></span>
                                </td>
                                <td class="py-3 px-4 font-medium text-slate-700" x-text="stream.gm"></td>
                                <td class="py-3 px-4">
                                    <div class="flex flex-wrap gap-1">
                                        <template x-for="char in stream.characters">
                                            <button @click="openModal(char)" class="bg-rose-50/50 text-rose-800 hover:bg-rose-100/70 text-xs font-medium px-2 py-0.5 rounded-md cursor-pointer border border-rose-100/50 transition-colors">
                                                <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                            </button>
                                        </template>
                                    </div>
                                </td>
                                <td class="py-3 px-4 text-center">
                                    <div class="flex flex-col gap-1">
                                        <template x-for="link in stream.links">
                                            <a :href="link.url" target="_blank" class="inline-block w-full bg-rose-600 hover:bg-rose-700 text-white text-[11px] py-0.5 px-2 rounded font-medium transition-colors" x-text="link.label"></a>
                                        </template>
                                        <template x-if="stream.hashtag">
                                            <a :href="'https://x.com/search?q=' + encodeURIComponent(stream.hashtag)" target="_blank" class="inline-block w-full bg-slate-800 hover:bg-slate-700 text-white text-[10px] py-0.5 px-2 rounded font-normal transition-colors" x-text="stream.hashtag"></a>
                                        </template>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <template x-if="filteredStreams().length === 0">
                <div class="p-10 text-center text-slate-400">該当する配信データが見つかりません。</div>
            </template>
        </div>

        <div x-show="modalOpen" x-transition class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-xs" @click.self="closeModal()" style="display: none;">
            <div class="bg-white rounded-xl shadow-lg border border-slate-200 max-w-md w-full overflow-hidden transform transition-all">
                <div class="bg-slate-900 px-5 py-3 flex justify-between items-center text-white">
                    <h3 class="font-bold text-sm tracking-wide" x-text="selectedPc.pcName"></h3>
                    <button @click="closeModal()" class="text-white/70 hover:text-white text-xl font-bold transition-colors">&times;</button>
                </div>
                <div class="p-5 space-y-4 text-sm">
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase mb-0.5">プレイヤー (PL)</span>
                        <div class="text-slate-800 font-semibold" x-text="selectedPc.plName || '未登録'"></div>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase mb-0.5">キャラクター属性/プロフィール</span>
                        <div class="text-slate-700 bg-slate-50 p-2.5 rounded-lg whitespace-pre-wrap text-xs border border-slate-100" x-text="selectedPc.profile || '未登録'"></div>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase mb-0.5">継続セッション数 / 履歴</span>
                        <div class="text-slate-700 text-xs font-medium" x-text="selectedPc.history || '未登録'"></div>
                    </div>
                    <template x-if="selectedPc.charasheetUrl">
                        <div>
                            <span class="block text-xs font-bold text-slate-400 uppercase mb-0.5">キャラクターシート</span>
                            <a :href="selectedPc.charasheetUrl" target="_blank" class="text-rose-600 hover:text-rose-700 font-bold text-xs inline-flex items-center gap-0.5 hover:underline">キャラシを見る ↗</a>
                        </div>
                    </template>
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase mb-0.5">備考</span>
                        <div class="text-slate-600 text-xs whitespace-pre-wrap" x-text="selectedPc.note || '-'"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function app() {
            return {
                updatedAt: "読み込み中...",
                streams: [],
                searchQuery: "",
                kosakaRole: "all",
                startDate: "",
                endDate: "",
                selectedStatus: "all",
                sortOrder: "desc",
                watchedIds: [],
                modalOpen: false,
                selectedPc: {},

                async initApp() {
                    const saved = localStorage.getItem('trpg_watched_ids');
                    if (saved) {
                        this.watchedIds = JSON.parse(saved);
                    }
                    
                    try {
                        // 💡 👇 ここにご自身のGitHubアカウント名とリポジトリ名を必ず設定してください 👇
                        const response = await fetch('https://na-nasika.github.io/ktrpg-fan-db/data.json');
                        if (!response.ok) throw new Error('データが見つかりません');
                        const data = await response.json();
                        
                        this.streams = data.streams;
                        this.updatedAt = data.updatedAt;
                    } catch (error) {
                        console.error("データの読み込みに失敗しました:", error);
                        this.updatedAt = "データの同期を待っています...";
                    }
                },

                toggleSortOrder() {
                    this.sortOrder = this.sortOrder === 'desc' ? 'asc' : 'desc';
                },

                filteredStreams() {
                    let result = this.streams.filter(stream => {
                        const query = this.searchQuery.toLowerCase();
                        const matchQuery = !query || 
                            stream.scenario.toLowerCase().includes(query) ||
                            stream.system.toLowerCase().includes(query) ||
                            stream.gm.toLowerCase().includes(query) ||
                            (stream.hashtag && stream.hashtag.toLowerCase().includes(query)) ||
                            stream.characters.some(c => 
                                (c.pcName && c.pcName.toLowerCase().includes(query)) || 
                                (c.plName && c.plName.toLowerCase().includes(query))
                            );

                        let matchKosaka = true;
                        if (this.kosakaRole === 'gm') {
                            matchKosaka = stream.gm.includes('コーサカ');
                        } else if (this.kosakaRole === 'pl') {
                            matchKosaka = stream.characters.some(c => c.plName.includes('コーサカ'));
                        }

                        let matchDate = true;
                        const streamDateStr = stream.date.replace(/\//g, '-');
                        if (this.startDate && streamDateStr < this.startDate) matchDate = false;
                        if (this.endDate && streamDateStr > this.endDate) matchDate = false;
                        
                        let matchStatus = true;
                        const watched = this.isWatched(stream.id);
                        if (this.selectedStatus === 'watched') matchStatus = watched;
                        if (this.selectedStatus === 'unwatched') matchStatus = !watched;

                        return matchQuery && matchKosaka && matchDate && matchStatus;
                    });

                    return result.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        return this.sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
                    });
                },

                isWatched(id) {
                    return this.watchedIds.includes(id);
                },

                toggleWatched(id) {
                    if (this.isWatched(id)) {
                        this.watchedIds = this.watchedIds.filter(wId => wId !== id);
                    } else {
                        this.watchedIds.push(id);
                    }
                    localStorage.setItem('trpg_watched_ids', JSON.stringify(this.watchedIds));
                },

                openModal(charData) {
                    this.selectedPc = charData;
                    this.modalOpen = true;
                },

                closeModal() {
                    this.modalOpen = false;
                    this.selectedPc = {};
                }
            }
        }
    </script>
</body>
</html>
