<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コーサカTRPGまとめ [非公式]</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts: Kiwi Maru & Noto Sans JP (フォント未対応時のフォールバック用) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* Kiwi Maruをベースに、漢字がない場合はNoto Sans JPを適用 */
        body {
            font-family: 'Kiwi Maru', 'Noto Sans JP', sans-serif;
        }
        /* スクロールバーのデザインも淡いピンク系に */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #fff5f5; }
        ::-webkit-scrollbar-thumb { background: #f43f5e; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #e11d48; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-rose-100 selection:text-rose-900">

    <div x-data="app()" x-init="initApp()" class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- ヘッダーエリア（ロゴ風デザイン＆余白の贅沢使い） -->
        <header class="mb-8 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 pb-4 border-b border-rose-100">
            <div class="flex items-center gap-3">
                <!-- 🦇を少しだけ傾けて深みのあるピンクにし、ロゴマーク風に -->
                <span class="text-2xl inline-block transform rotate-[-12deg] select-none text-rose-600">🦇</span>
                <h1 class="text-2xl font-black text-slate-900 tracking-wider">コーサカTRPGまとめ</h1>
                <span class="text-[10px] bg-rose-50 text-rose-600 px-2 py-0.5 rounded-full font-bold border border-rose-100 tracking-wide">非公式</span>
            </div>
            <div class="text-xs text-slate-400 font-medium tracking-tight">
                最終更新: <span x-text="updatedAt" class="text-slate-600 font-bold"></span>
            </div>
        </header>

        <!-- フィルターエリア -->
        <div class="bg-white p-5 rounded-2xl border border-slate-150 mb-6 space-y-4 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- キーワード検索 -->
                <div>
                    <input type="text" x-model="searchQuery" placeholder="🔍 シナリオ、システム、PL、PC名..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition-all">
                </div>

                <!-- 期間フィルター -->
                <div class="md:col-span-2 flex items-center gap-2">
                    <input type="date" x-model="startDate" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition-all text-slate-600">
                    <span class="text-slate-400 text-xs font-bold">〜</span>
                    <input type="date" x-model="endDate" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 focus:border-transparent transition-all text-slate-600">
                </div>
            </div>

            <!-- 下段：究極に引き算したトグル式ボタン（「すべて」を排除） -->
            <div class="flex flex-wrap items-center gap-3 pt-3 border-t border-slate-100 text-xs">
                
                <!-- 配役トグル -->
                <div class="inline-flex gap-1.5 bg-slate-50 p-1 rounded-xl border border-slate-200">
                    <button @click="toggleRole('gm')" :class="kosakaRole === 'gm' ? 'bg-rose-500 text-white font-bold' : 'text-slate-600 hover:bg-slate-200/50'" class="px-4 py-1.5 rounded-lg transition-all cursor-pointer">GM</button>
                    <button @click="toggleRole('pl')" :class="kosakaRole === 'pl' ? 'bg-rose-500 text-white font-bold' : 'text-slate-600 hover:bg-slate-200/50'" class="px-4 py-1.5 rounded-lg transition-all cursor-pointer">PL</button>
                </div>

                <!-- ステータストグル -->
                <div class="inline-flex gap-1.5 bg-slate-50 p-1 rounded-xl border border-slate-200">
                    <button @click="toggleStatus('watched')" :class="selectedStatus === 'watched' ? 'bg-rose-500 text-white font-bold' : 'text-slate-600 hover:bg-slate-200/50'" class="px-4 py-1.5 rounded-lg transition-all cursor-pointer">✅ 視聴済み</button>
                    <button @click="toggleStatus('unwatched')" :class="selectedStatus === 'unwatched' ? 'bg-rose-500 text-white font-bold' : 'text-slate-600 hover:bg-slate-200/50'" class="px-4 py-1.5 rounded-lg transition-all cursor-pointer">⬜ 未視聴</button>
                </div>

                <!-- 日付ソート -->
                <button @click="toggleSortOrder()" class="sm:ml-auto border border-slate-200 hover:bg-slate-50 text-slate-600 font-medium px-4 py-1.5 rounded-xl transition-all flex items-center gap-1.5 cursor-pointer">
                    <span x-text="sortOrder === 'desc' ? '📅 新しい順' : '📅 古い順'"></span>
                </button>
            </div>
        </div>

        <!-- 配信一覧テーブル -->
        <div class="bg-white rounded-2xl border border-slate-150 overflow-hidden shadow-sm">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 tracking-wider">
                            <th class="py-3.5 px-4 w-16 text-center">視聴</th>
                            <th class="py-3.5 px-4 w-28">配信日</th>
                            <th class="py-3.5 px-4">シナリオ / システム</th>
                            <th class="py-3.5 px-4">GM</th>
                            <th class="py-3.5 px-4">PL (PC ※クリックで詳細)</th>
                            <th class="py-3.5 px-4 w-32 text-center">リンク</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm">
                        <template x-for="stream in filteredStreams()" :key="stream.id">
                            <tr class="hover:bg-rose-50/20 transition-colors" :class="isWatched(stream.id) ? 'bg-rose-50/10' : ''">
                                <!-- 視聴チェック -->
                                <td class="py-4 px-4 text-center">
                                    <input type="checkbox" :checked="isWatched(stream.id)" @change="toggleWatched(stream.id)" class="w-4 h-4 rounded border-slate-300 text-rose-500 focus:ring-rose-400 cursor-pointer accent-rose-500">
                                </td>
                                <!-- 配信日 -->
                                <td class="py-4 px-4 text-slate-400 font-medium" x-text="stream.date"></td>
                                <!-- シナリオ / システム -->
                                <td class="py-4 px-4">
                                    <div class="font-bold text-slate-900 tracking-wide" x-text="stream.scenario"></div>
                                    <span class="inline-block bg-slate-100 text-slate-500 text-[11px] px-2 py-0.5 rounded-md mt-1.5 font-medium" x-text="stream.system"></span>
                                </td>
                                <!-- GM -->
                                <td class="py-4 px-4 font-medium text-slate-700" x-text="stream.gm"></td>
                                <!-- PL / PC -->
                                <td class="py-4 px-4">
                                    <div class="flex flex-wrap gap-1.5">
                                        <template x-for="char in stream.characters">
                                            <button @click="openModal(char)" class="bg-rose-50/40 text-rose-700 hover:bg-rose-100/60 text-xs font-medium px-2.5 py-1 rounded-lg cursor-pointer border border-rose-100/30 transition-colors">
                                                <span x-text="char.plName ? char.plName + '（' + char.pcName + '）' : char.pcName"></span>
                                            </button>
                                        </template>
                                    </div>
                                </td>
                                <!-- 複数リンク -->
                                <td class="py-4 px-4 text-center">
                                    <div class="flex flex-col gap-1.5">
                                        <template x-for="link in stream.links">
                                            <a :href="link.url" target="_blank" class="inline-block w-full bg-rose-500 hover:bg-rose-600 text-white text-[11px] py-1 px-2 rounded-lg font-medium transition-colors shadow-xs" x-text="link.label"></a>
                                        </template>
                                        <template x-if="stream.hashtag">
                                            <a :href="'https://x.com/search?q=' + encodeURIComponent(stream.hashtag)" target="_blank" class="inline-block w-full bg-slate-700 hover:bg-slate-600 text-white text-[10px] py-0.5 px-2 rounded-lg font-normal transition-colors" x-text="stream.hashtag"></a>
                                        </template>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <!-- データゼロ表示 -->
            <template x-if="filteredStreams().length === 0">
                <div class="p-12 text-center text-slate-400 font-medium">該当する配信データが見つかりません。</div>
            </template>
        </div>

        <!-- PC詳細ポップアップ (モダール) -->
        <div x-show="modalOpen" x-transition class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-xs" @click.self="closeModal()" style="display: none;">
            <div class="bg-white rounded-2xl shadow-xl border border-slate-100 max-w-md w-full overflow-hidden transform transition-all">
                <div class="bg-slate-900 px-6 py-4 flex justify-between items-center text-white">
                    <h3 class="font-bold text-sm tracking-wider" x-text="selectedPc.pcName"></h3>
                    <button @click="closeModal()" class="text-white/60 hover:text-white text-2xl font-light transition-colors leading-none">&times;</button>
                </div>
                <div class="p-6 space-y-4 text-sm">
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">プレイヤー (PL)</span>
                        <div class="text-slate-800 font-bold" x-text="selectedPc.plName || '未登録'"></div>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">プロフィール</span>
                        <div class="text-slate-700 bg-slate-50 p-3 rounded-xl whitespace-pre-wrap text-xs border border-slate-100 leading-relaxed" x-text="selectedPc.profile || '未登録'"></div>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">継続セッション数 / 履歴</span>
                        <div class="text-slate-600 text-xs font-medium" x-text="selectedPc.history || '未登録'"></div>
                    </div>
                    <template x-if="selectedPc.charasheetUrl">
                        <div class="pt-1">
                            <a :href="selectedPc.charasheetUrl" target="_blank" class="text-rose-500 hover:text-rose-600 font-bold text-xs inline-flex items-center gap-1 hover:underline">キャラクターシートを見る ↗</a>
                        </div>
                    </template>
                    <div class="pt-2 border-t border-slate-100">
                        <span class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">備考</span>
                        <div class="text-slate-500 text-xs whitespace-pre-wrap leading-relaxed" x-text="selectedPc.note || '-'"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- スクリプト部 -->
    <script>
        function app() {
            return {
                updatedAt: "同期中...",
                streams: [],
                searchQuery: "",
                kosakaRole: "all",      // 'all', 'gm', 'pl'
                selectedStatus: "all",  // 'all', 'watched', 'unwatched'
                startDate: "",
                endDate: "",
                sortOrder: "desc",
                watchedIds: [],
                modalOpen: false,
                selectedPc: {},

                async initApp() {
                    const saved = localStorage.getItem('trpg_watched_ids');
                    if (saved) {
                        this.watchedIds = JSON.parse(saved);
                    }
                    
                    try {
                        // 💡 👇 ここにGitHubのアカウント名とリポジトリ名を正確に入れてください 👇
                        const response = await fetch('https://na-nasika.github.io/ktrpg-fan-db/data.json');
                        if (!response.ok) throw new Error('データが見つかりません');
                        const data = await response.json();
                        
                        this.streams = data.streams;
                        this.updatedAt = data.updatedAt;
                    } catch (error) {
                        console.error("データの読み込みに失敗しました:", error);
                        this.updatedAt = "同期エラー";
                    }
                },

                // 配役ボタンのトグル処理
                toggleRole(role) {
                    if (this.kosakaRole === role) {
                        this.kosakaRole = "all"; // すでに押されているボタンをもう一度押したら解除（すべて表示）
                    } else {
                        this.kosakaRole = role; // 選択された役に絞り込み
                    }
                },

                // ステータスボタンのトグル処理
                toggleStatus(status) {
                    if (this.selectedStatus === status) {
                        this.selectedStatus = "all"; // 解除
                    } else {
                        this.selectedStatus = status; // 絞り込み
                    }
                },

                toggleSortOrder() {
                    this.sortOrder = this.sortOrder === 'desc' ? 'asc' : 'desc';
                },

                filteredStreams() {
                    let result = this.streams.filter(stream => {
                        const query = this.searchQuery.toLowerCase();
                        const matchQuery = !query || 
                            stream.scenario.toLowerCase().includes(query) ||
                            stream.system.toLowerCase().includes(query) ||
                            stream.gm.toLowerCase().includes(query) ||
                            (stream.hashtag && stream.hashtag.toLowerCase().includes(query)) ||
                            stream.characters.some(c => 
                                (c.pcName && c.pcName.toLowerCase().includes(query)) || 
                                (c.plName && c.plName.toLowerCase().includes(query))
                            );

                        let matchKosaka = true;
                        if (this.kosakaRole === 'gm') {
                            matchKosaka = stream.gm.includes('コーサカ');
                        } else if (this.kosakaRole === 'pl') {
                            matchKosaka = stream.characters.some(c => c.plName && c.plName.includes('コーサカ'));
                        }

                        let matchDate = true;
                        const streamDateStr = stream.date.replace(/\//g, '-');
                        if (this.startDate && streamDateStr < this.startDate) matchDate = false;
                        if (this.endDate && streamDateStr > this.endDate) matchDate = false;
                        
                        let matchStatus = true;
                        const watched = this.isWatched(stream.id);
                        if (this.selectedStatus === 'watched') matchStatus = watched;
                        if (this.selectedStatus === 'unwatched') matchStatus = !watched;

                        return matchQuery && matchKosaka && matchDate && matchStatus;
                    });

                    return result.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        return this.sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
                    });
                },

                isWatched(id) {
                    return this.watchedIds.includes(id);
                },

                toggleWatched(id) {
                    if (this.isWatched(id)) {
                        this.watchedIds = this.watchedIds.filter(wId => wId !== id);
                    } else {
                        this.watchedIds.push(id);
                    }
                    localStorage.setItem('trpg_watched_ids', JSON.stringify(this.watchedIds));
                },

                openModal(charData) {
                    this.selectedPc = charData;
                    this.modalOpen = true;
                },

                closeModal() {
                    this.modalOpen = false;
                    this.selectedPc = {};
                }
            }
        }
    </script>
</body>
</html>
